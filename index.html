<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }
        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🚀 Fake Job Detection</h1>

<textarea id="input" placeholder="Paste job message here..."></textarea><br>

<button onclick="analyze()">Analyze</button>

<div class="result" id="result"></div>

<script>
async function analyze() {
    let text = document.getElementById("input").value;

    let res = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
    });

    let data = await res.json();

    let r = document.getElementById("result");

    r.innerHTML = `
        <h2>${data.prediction}</h2>
        <p><b>Risk:</b> ${data.risk}</p>
        <p><b>Company:</b> ${data.company}</p>
        <p><b>Reasons:</b> ${data.reasons.join(", ")}</p>

        <button onclick="window.open('${data.links.google}', '_blank')">Google 🔍</button>
        <button onclick="window.open('${data.links.linkedin}', '_blank')">LinkedIn 💼</button>
    `;
}
</script>

</body>
</html>
